version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ua-designs-pms-db
    environment:
      POSTGRES_DB: ua_designs_pms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ua_designs_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - ua-designs-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: ua-designs-pms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ua-designs-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ua-designs-pms-backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ua_designs_pms
      DB_USER: postgres
      DB_PASSWORD: ua_designs_password
      DB_DIALECT: postgres
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ua_designs_jwt_secret_2024
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    networks:
      - ua-designs-network
    restart: unless-stopped
    command: npm run dev

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ua-designs-pms-frontend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_PUSHER_APP_ID: ${PUSHER_APP_ID}
      REACT_APP_PUSHER_KEY: ${PUSHER_KEY}
      REACT_APP_PUSHER_CLUSTER: ${PUSHER_CLUSTER}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ua-designs-network
    restart: unless-stopped
    command: npm start

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ua-designs-pms-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - ua-designs-network
    restart: unless-stopped

  # PM2 Process Manager (for production)
  pm2:
    image: keymetrics/pm2:latest
    container_name: ua-designs-pms-pm2
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - ua-designs-network
    restart: unless-stopped
    command: pm2-runtime start ecosystem.config.js

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ua-designs-network:
    driver: bridge 